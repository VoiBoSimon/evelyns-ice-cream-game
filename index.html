<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Evelyn's Ice Cream Van</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #fef9c3; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
      canvas { display: block; }

      #rotate-prompt {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: linear-gradient(160deg, #fde68a 0%, #fbcfe8 100%);
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
        text-align: center;
        padding: 32px;
      }
      #rotate-prompt .rotate-icon {
        font-size: 72px;
        animation: spin-hint 2s ease-in-out infinite;
      }
      #rotate-prompt h2 {
        font-family: Arial Rounded MT Bold, Arial, sans-serif;
        font-size: 26px;
        color: #be185d;
      }
      #rotate-prompt p {
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: #9d174d;
      }
      @keyframes spin-hint {
        0%, 100% { transform: rotate(0deg); }
        40%       { transform: rotate(90deg); }
        60%       { transform: rotate(90deg); }
      }
      @media (orientation: portrait) {
        #rotate-prompt { display: flex; }
      }

      #fullscreen-btn {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 9998;
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.45);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.7;
        transition: opacity 0.2s;
      }
      #fullscreen-btn:hover { opacity: 1; }
      #fullscreen-btn svg { width: 22px; height: 22px; fill: #ffffff; }
    </style>
  </head>
  <body>
    <div id="rotate-prompt">
      <div class="rotate-icon">📱</div>
      <h2>Turn your phone sideways!</h2>
      <p>This game is best played in landscape mode.</p>
    </div>

    <button id="fullscreen-btn" title="Fullscreen">
      <svg id="fs-expand" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3h6v2H5v4H3zm12 0h6v6h-2V5h-4zM3 15h2v4h4v2H3zm16 4h-4v2h6v-6h-2z"/>
      </svg>
      <svg id="fs-compress" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <path d="M5 16h3v3h2v-5H5zm3-8H5v2h5V5H8zm6 11h2v-3h3v-2h-5zm2-11V5h-2v5h5V8z"/>
      </svg>
    </button>

    <script>
      const btn = document.getElementById('fullscreen-btn')
      const expand = document.getElementById('fs-expand')
      const compress = document.getElementById('fs-compress')

      btn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {})
        } else {
          document.exitFullscreen().catch(() => {})
        }
      })

      document.addEventListener('fullscreenchange', () => {
        const fs = !!document.fullscreenElement
        expand.style.display = fs ? 'none' : 'block'
        compress.style.display = fs ? 'block' : 'none'
      })
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
